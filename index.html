<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FOCUSYNC - Developer Productivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0B1C2D',
              card: '#132F4C',
              primary: '#00E5FF',
              secondary: '#8B5CF6',
              success: '#22C55E',
              warning: '#F59E0B',
              alert: '#EF4444',
              text: '#E5E7EB',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-in-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'wave': 'wave 2.5s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              wave: {
                '0%': { transform: 'rotate(0.0deg)' },
                '10%': { transform: 'rotate(14.0deg)' },
                '20%': { transform: 'rotate(-8.0deg)' },
                '30%': { transform: 'rotate(14.0deg)' },
                '40%': { transform: 'rotate(-4.0deg)' },
                '50%': { transform: 'rotate(10.0deg)' },
                '60%': { transform: 'rotate(0.0deg)' },
                '100%': { transform: 'rotate(0.0deg)' },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #0B1C2D;
        color: #E5E7EB;
        overflow-x: hidden;
        position: relative;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B1C2D; 
      }
      ::-webkit-scrollbar-thumb {
        background: #132F4C; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2e4a6d; 
      }
      .glass-panel {
        background: rgba(19, 47, 76, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .neon-glow {
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
      }
      .neon-text {
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
      }

      /* Star/Snow Effect */
      #stars-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0; /* Behind content, on top of background color */
        overflow: hidden;
      }
      #root {
        position: relative;
        z-index: 1; /* Content sits above stars */
      }
      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.2;
        animation: fall linear infinite;
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.3); /* Subtle glow */
      }
      @keyframes fall {
        0% { transform: translateY(-10vh) translateX(0px); opacity: 0; }
        10% { opacity: var(--star-opacity, 0.4); }
        90% { opacity: var(--star-opacity, 0.4); }
        100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="stars-container"></div>
    <div id="root"></div>
    <script>
      // Generate stars dynamically with more density and variation
      const container = document.getElementById('stars-container');
      const starCount = 150; // Increased density for premium feel
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        
        // Varied sizes
        const sizeVal = Math.random();
        let size;
        if (sizeVal > 0.9) size = '3px'; // Occasional large snowflake
        else if (sizeVal > 0.6) size = '2px';
        else size = '1px';
        
        star.style.width = size;
        star.style.height = size;
        
        // Position
        star.style.left = Math.random() * 100 + 'vw';
        
        // Animation params
        star.style.animationDuration = Math.random() * 20 + 15 + 's'; // Slower, elegant fall
        star.style.animationDelay = Math.random() * -35 + 's';
        
        // Random opacity for depth
        const opacity = Math.random() * 0.5 + 0.2;
        star.style.setProperty('--star-opacity', opacity);
        
        container.appendChild(star);
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
